<!DOCTYPE html>
<html lang="en" class="bg-zinc-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Acadexa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    .tail-container { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="tail-container min-h-screen bg-zinc-50 flex items-center justify-center">

  <div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-10">
      <div class="w-12 h-12 bg-amber-500 rounded-3xl flex items-center justify-center text-white font-bold text-4xl shadow-inner">A</div>
      <h1 class="text-4xl font-semibold tracking-tight text-zinc-900">Acadexa</h1>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-10 border border-zinc-100">
      <h2 class="text-3xl font-semibold text-center text-zinc-900 mb-2">Create Account</h2>
      <p class="text-center text-zinc-600 mb-8">Join thousands of students learning better</p>

      <form class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-2">First Name</label>
            <input type="text" class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition" placeholder="Dev" required />
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-2">Last Name</label>
            <input type="text" class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition" placeholder="Kumar" required />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-2">Email</label>
          <input type="email" class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition" placeholder="dev@example.com" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-2">Roll Number</label>
          <input type="text" class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition" placeholder="210010123" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-2">Password</label>
          <input type="password" class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition" placeholder="Create strong password" required />
        </div>

        <button type="submit"
                class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-3xl transition shadow-sm text-lg">
          Create Account
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-zinc-600">
          Already have an account? 
          <a href="login.html" class="text-amber-600 font-semibold hover:text-amber-700">Sign in</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
