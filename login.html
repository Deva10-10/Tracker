<!DOCTYPE html>
<html lang="en" class="bg-zinc-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Acadexa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    .tail-container { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="tail-container min-h-screen bg-zinc-50 flex items-center justify-center">

  <div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-10">
      <div class="w-12 h-12 bg-amber-500 rounded-3xl flex items-center justify-center text-white font-bold text-4xl shadow-inner">A</div>
      <h1 class="text-4xl font-semibold tracking-tight text-zinc-900">Acadexa</h1>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-10 border border-zinc-100">
      <h2 class="text-3xl font-semibold text-center text-zinc-900 mb-2">Welcome back</h2>
      <p class="text-center text-zinc-600 mb-8">Sign in to continue your learning journey</p>

      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-2">Email or Roll Number</label>
          <input type="text" 
                 class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition"
                 placeholder="dev@example.com or 2100101" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-2">Password</label>
          <input type="password" 
                 class="w-full px-5 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-amber-500 transition"
                 placeholder="••••••••" required />
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="w-4 h-4 accent-amber-500" />
            <span class="text-zinc-600">Remember me</span>
          </label>
          <a href="#" class="text-amber-600 hover:text-amber-700 font-medium">Forgot password?</a>
        </div>

        <button type="submit"
                class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-3xl transition shadow-sm text-lg">
          Sign In
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-zinc-600">
          Don't have an account? 
          <a href="signup.html" class="text-amber-600 font-semibold hover:text-amber-700">Sign up</a>
        </p>
      </div>
    </div>

    <div class="text-center mt-6">
      <a href="index.html" class="text-zinc-500 hover:text-zinc-700 text-sm flex items-center justify-center gap-2">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>

</body>
</html>
