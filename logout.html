<!DOCTYPE html>
<html lang="en" class="bg-zinc-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logout - Acadexa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    .tail-container { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="tail-container min-h-screen bg-zinc-50 flex items-center justify-center">

  <div class="text-center max-w-md px-6">
    <div class="mb-10">
      <i class="fas fa-sign-out-alt text-8xl text-amber-500 mb-6"></i>
      <h2 class="text-4xl font-semibold text-zinc-900">Logout</h2>
      <p class="text-zinc-600 mt-3 text-lg">Are you sure you want to logout?</p>
    </div>

    <div class="space-y-4">
      <a href="login.html" 
         class="block w-full py-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-3xl transition text-lg">
        Yes, Logout
      </a>
      
      <a href="index.html" 
         class="block w-full py-4 bg-white border border-zinc-300 hover:bg-zinc-50 text-zinc-700 font-semibold rounded-3xl transition text-lg">
        Cancel
      </a>
    </div>

    <div class="mt-12 text-sm text-zinc-500">
      See you soon, Dev 👋
    </div>
  </div>

</body>
</html>
